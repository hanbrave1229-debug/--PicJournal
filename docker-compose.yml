services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: photo-manager-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # 照片目录：NAS 真实路径 → 容器只读
      - ${PHOTOS_DIR:-/volume1/photos}:/photos:ro
      # 数据持久化
      - ${DATA_DIR:-./data}/db:/app/data/db
      - ${DATA_DIR:-./data}/thumbnails:/app/data/thumbnails
      # 离线地理编码数据库（build_geo_db.py 生成的 geonames.db）
      - ${DATA_DIR:-./data}/geo:/app/data/geo
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/db/photos.db
      - THUMBNAILS_DIR=/app/data/thumbnails
      - PHOTOS_ROOT=/photos
      - WORKER_PROCESSES=${WORKER_PROCESSES:-4}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000"]}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: photo-manager-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
